<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH Academy — AI Tools Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+Bengali:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --surface: #0d1220;
    --surface2: #131929;
    --border: rgba(255,255,255,0.07);
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --text: #e8eaf0;
    --muted: #6b7a99;
    --glow: rgba(0,212,255,0.15);
    --glow2: rgba(124,58,237,0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans Bengali', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG canvas */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .page-wrap { position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 70px 20px 40px;
    position: relative;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, rgba(0,212,255,0.12), rgba(124,58,237,0.12));
    border: 1px solid rgba(0,212,255,0.25);
    border-radius: 100px;
    padding: 8px 22px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 28px;
    animation: fadeDown 0.7s ease both;
  }

  .logo-badge .dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(38px, 7vw, 80px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeDown 0.8s 0.1s ease both;
  }

  header .subtitle {
    margin-top: 16px;
    font-size: 16px;
    color: var(--muted);
    font-weight: 400;
    animation: fadeDown 0.8s 0.2s ease both;
    line-height: 1.7;
  }

  /* stats bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    margin-top: 36px;
    animation: fadeDown 0.8s 0.3s ease both;
  }
  .stat-item {
    text-align: center;
  }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
  }
  .stat-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── SEARCH + FILTER ── */
  .controls {
    max-width: 900px;
    margin: 50px auto 0;
    padding: 0 20px;
    animation: fadeUp 0.8s 0.4s ease both;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .search-wrap svg {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  #searchInput {
    width: 100%;
    padding: 16px 20px 16px 52px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans Bengali', sans-serif;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  #searchInput:focus {
    border-color: rgba(0,212,255,0.4);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.08), 0 0 20px rgba(0,212,255,0.06);
  }
  #searchInput::placeholder { color: var(--muted); }

  .filter-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-tab {
    padding: 8px 18px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Noto Sans Bengali', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
  .filter-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    max-width: 1300px;
    margin: 40px auto 0;
    padding: 0 20px 80px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(.22,1,.36,1), box-shadow 0.3s, border-color 0.3s;
    animation: fadeUp 0.6s ease both;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .card:hover {
    transform: translateY(-6px);
    border-color: rgba(0,212,255,0.25);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px var(--glow);
  }
  .card:hover::before { opacity: 1; }
  .card.hidden { display: none; }

  .card-header {
    padding: 22px 22px 16px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }

  .card-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    position: relative;
  }

  .card-title-group { flex: 1; min-width: 0; }
  .card-name {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }
  .card-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    opacity: 0.7;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-badge {
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-body { padding: 18px 22px; }

  .card-tagline {
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 16px;
  }

  .features-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-bottom: 16px;
  }
  .features-list li {
    font-size: 13px;
    color: #a0aec0;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.5;
  }
  .features-list li::before {
    content: '▸';
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 1px;
    font-size: 11px;
  }

  .use-tip {
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.12);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12.5px;
    color: #7ec8d8;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .use-tip strong { color: var(--accent); }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn-visit {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'Noto Sans Bengali', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    display: block;
    transition: opacity 0.2s, transform 0.2s;
  }
  .btn-visit:hover { opacity: 0.88; transform: scale(0.98); }

  .btn-copy {
    width: 40px; height: 40px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-copy:hover { border-color: var(--accent); color: var(--accent); }

  /* ── SHARE SECTION ── */
  .share-section {
    text-align: center;
    padding: 30px 20px 60px;
  }
  .share-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 32px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 100px;
    border: none;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 30px rgba(124,58,237,0.35);
  }
  .share-btn:hover { transform: scale(1.04); box-shadow: 0 12px 40px rgba(124,58,237,0.5); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 100px;
    padding: 12px 24px;
    font-size: 14px;
    color: var(--accent);
    font-weight: 600;
    z-index: 9999;
    transition: transform 0.4s cubic-bezier(.22,1,.36,1);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 30px 20px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }
  footer strong { color: var(--accent); }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity:0; transform: translateY(-20px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(24px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform: scale(1); }
    50%      { opacity:0.5; transform: scale(1.4); }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .stats-bar { gap: 24px; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="page-wrap">

  <!-- HEADER -->
  <header>
    <div class="logo-badge">
      <span class="dot"></span>
      MH Academy
      <span class="dot"></span>
    </div>
    <h1>AI Tools Hub</h1>
    <p class="subtitle">সেরা ২৬টি AI ও ডিজিটাল টুলস — বিস্তারিত গাইডলাইনসহ<br>শিখুন, তৈরি করুন, এগিয়ে যান।</p>

    <div class="stats-bar">
      <div class="stat-item"><div class="stat-num">26</div><div class="stat-label">টুলস</div></div>
      <div class="stat-item"><div class="stat-num">8</div><div class="stat-label">ক্যাটাগরি</div></div>
      <div class="stat-item"><div class="stat-num">100%</div><div class="stat-label">ফ্রি গাইড</div></div>
    </div>
  </header>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-wrap">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="টুলস খুঁজুন... (যেমন: AI, Design, Video)">
    </div>
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-cat="all">সব টুলস</button>
      <button class="filter-tab" data-cat="ai">🤖 AI</button>
      <button class="filter-tab" data-cat="design">🎨 ডিজাইন</button>
      <button class="filter-tab" data-cat="code">💻 কোডিং</button>
      <button class="filter-tab" data-cat="video">🎬 ভিডিও</button>
      <button class="filter-tab" data-cat="automation">⚙️ অটোমেশন</button>
      <button class="filter-tab" data-cat="business">💼 বিজনেস</button>
      <button class="filter-tab" data-cat="hosting">🌐 হোস্টিং</button>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid" id="toolGrid"></div>

  <!-- SHARE -->
  <div class="share-section">
    <button class="share-btn" onclick="sharePage()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51 15.42 17.49M15.41 6.51 8.59 10.49"/></svg>
      শেয়ার করুন বন্ধুদের সাথে 🎉
    </button>
  </div>

  <footer>
    তৈরি করা হয়েছে <strong>MH Academy</strong> এর জন্য — শিক্ষা ও প্রযুক্তির সেতুবন্ধন
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
// ── BG CANVAS ANIMATION ──
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

for(let i=0; i<70; i++) {
  particles.push({
    x: Math.random()*1400, y: Math.random()*900,
    r: Math.random()*1.5+0.3,
    vx: (Math.random()-0.5)*0.2,
    vy: (Math.random()-0.5)*0.2,
    opacity: Math.random()*0.4+0.1
  });
}

function drawBG() {
  ctx.clearRect(0,0,W,H);
  // gradient blobs
  const g1 = ctx.createRadialGradient(W*0.2,H*0.2,0,W*0.2,H*0.2,W*0.4);
  g1.addColorStop(0,'rgba(0,212,255,0.04)'); g1.addColorStop(1,'transparent');
  ctx.fillStyle=g1; ctx.fillRect(0,0,W,H);

  const g2 = ctx.createRadialGradient(W*0.8,H*0.7,0,W*0.8,H*0.7,W*0.35);
  g2.addColorStop(0,'rgba(124,58,237,0.05)'); g2.addColorStop(1,'transparent');
  ctx.fillStyle=g2; ctx.fillRect(0,0,W,H);

  // grid lines
  ctx.strokeStyle='rgba(255,255,255,0.018)';
  ctx.lineWidth=1;
  for(let x=0;x<W;x+=60){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for(let y=0;y<H;y+=60){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }

  // particles
  particles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,212,255,${p.opacity})`;
    ctx.fill();
  });
  requestAnimationFrame(drawBG);
}
drawBG();

// ── TOOLS DATA ──
const tools = [
  {
    id:'nanobanana', name:'NanoBanana', url:'NanoBanana.com',
    cat:'ai', icon:'🍌', color:'#f59e0b',
    badge:'AI প্রজেক্ট', badgeBg:'rgba(245,158,11,0.15)', badgeColor:'#f59e0b',
    tagline:'⚡ AI প্রজেক্ট ডেভেলপমেন্ট প্ল্যাটফর্ম',
    desc:'NanoBanana হলো একটি পাওয়ারফুল AI প্রজেক্ট বিল্ডিং প্ল্যাটফর্ম যেখানে আপনি দ্রুত AI-পাওয়ার্ড অ্যাপ্লিকেশন তৈরি করতে পারবেন কোনো জটিল কোডিং ছাড়াই।',
    features:[
      'AI প্রজেক্ট টেমপ্লেট দিয়ে দ্রুত শুরু করুন',
      'ড্র্যাগ-এন্ড-ড্রপ AI ওয়ার্কফ্লো বিল্ডার',
      'বিভিন্ন AI মডেল ইন্টিগ্রেট করুন সহজে',
      'ওয়ান-ক্লিকে প্রজেক্ট ডিপ্লয় করুন',
    ],
    tip:'💡 শুরুতে "New Project" → AI টেমপ্লেট সিলেক্ট → কাস্টমাইজ করুন → পাবলিশ করুন। প্রজেক্ট শেয়ার করে টিমের সাথে কোলাব করুন।'
  },
  {
    id:'claude', name:'Claude AI', url:'Claude.ai',
    cat:'ai', icon:'🤖', color:'#d97706',
    badge:'অ্যাডভান্সড AI', badgeBg:'rgba(217,119,6,0.15)', badgeColor:'#d97706',
    tagline:'✍️ অ্যাডভান্সড রাইটিং ও চ্যাটিং',
    desc:'Anthropic-এর তৈরি Claude হলো সবচেয়ে নিরাপদ এবং স্মার্ট AI অ্যাসিস্ট্যান্ট। লেখালেখি, বিশ্লেষণ, কোডিং, সৃজনশীল কাজ সবকিছুতেই অসাধারণ।',
    features:[
      'দীর্ঘ ডকুমেন্ট বিশ্লেষণ ও সারসংক্ষেপ করুন',
      'বাংলা ও ইংরেজিতে প্রফেশনাল কন্টেন্ট লিখুন',
      'কোড রিভিউ, ডিবাগ ও ব্যাখ্যা পান',
      'জটিল বিষয় সহজ ভাষায় বুঝুন',
      'PDF, ইমেজ আপলোড করে প্রশ্ন করুন',
    ],
    tip:'💡 System Prompt ব্যবহার করুন রোল সেট করতে। "আমি তোমাকে একজন মার্কেটিং এক্সপার্ট হিসেবে চাই" — এভাবে শুরু করলে আরো ভালো আউটপুট পাবেন।'
  },
  {
    id:'perplexity', name:'Perplexity AI', url:'Perplexity.ai',
    cat:'ai', icon:'🔍', color:'#00d4ff',

// ── RENDER CARDS ──
function renderCards(filteredTools) {
  const grid = document.getElementById('toolGrid');
  grid.innerHTML = '';
  filteredTools.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 0.04}s`;
    card.dataset.cat = t.cat;
    card.dataset.name = t.name.toLowerCase();
    card.innerHTML = `
      <div class="card-header">
        <div class="card-icon" style="background:${t.color}22; border:1.5px solid ${t.color}33;">
          <span>${t.icon}</span>
        </div>
        <div class="card-title-group">
          <div class="card-name">${t.name}</div>
          <div class="card-url">${t.url}</div>
        </div>
        <div class="card-badge" style="background:${t.badgeBg}; color:${t.badgeColor}; border:1px solid ${t.badgeColor}33;">${t.badge}</div>
      </div>
      <div class="card-body">
        <div class="card-tagline">${t.tagline}</div>
        <div class="card-desc">${t.desc}</div>
        <ul class="features-list">
          ${t.features.map(f=>`<li>${f}</li>`).join('')}
        </ul>
        <div class="use-tip"><strong>💡 ব্যবহার টিপস:</strong> ${t.tip.replace('💡 ','')}</div>
        <div class="card-footer">
          <a href="https://${t.url}" target="_blank" rel="noopener" class="btn-visit">🔗 ভিজিট করুন</a>
          <button class="btn-copy" onclick="copyUrl('${t.url}',this)" title="URL কপি করুন">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

renderCards(tools);

// ── FILTER ──
let activeCat = 'all';
let searchQuery = '';

function applyFilter() {
  let filtered = tools;
  if(activeCat !== 'all') filtered = filtered.filter(t=>t.cat===activeCat);
  if(searchQuery) filtered = filtered.filter(t=>
    t.name.toLowerCase().includes(searchQuery) ||
    t.desc.toLowerCase().includes(searchQuery) ||
    t.badge.toLowerCase().includes(searchQuery) ||
    t.url.toLowerCase().includes(searchQuery)
  );
  renderCards(filtered);
}

document.getElementById('filterTabs').addEventListener('click', e=>{
  const btn = e.target.closest('.filter-tab');
  if(!btn) return;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  applyFilter();
});

document.getElementById('searchInput').addEventListener('input', e=>{
  searchQuery = e.target.value.toLowerCase().trim();
  applyFilter();
});

// ── COPY URL ──
function copyUrl(url, btn) {
  navigator.clipboard.writeText('https://'+url).then(()=>{
    btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="#00d4ff" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
    showToast('✅ URL কপি হয়েছে!');
    setTimeout(()=>{
      btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    }, 2000);
  });
}

// ── SHARE ──
function sharePage() {
  const text = '🤖 MH Academy — সেরা ২৬টি AI ও ডিজিটাল টুলসের বিস্তারিত গাইড!\n\n#MHAcademy #AITools #BangladeshTech';
  if(navigator.share) {
    navigator.share({ title: 'MH Academy AI Tools Hub', text });
  } else {
    navigator.clipboard.writeText(text);
    showToast('📋 শেয়ার টেক্সট কপি হয়েছে!');
  }
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>
